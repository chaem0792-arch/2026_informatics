
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e17;--surface:#1a1928;--card:#22213a;--border:#35335a;
  --accent:#7c5cbf;--accent2:#e05c8a;--accent3:#3ecfb2;--accent4:#f5a623;
  --text:#e8e6f0;--muted:#9896b0;
}
body{background:var(--bg);color:var(--text);font-family:'Gowun Dodum',sans-serif;}

header{
  background:linear-gradient(135deg,#1a1928 0%,#2d1f4e 100%);
  border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:14px;
}
.logo{font-family:'Black Han Sans',sans-serif;font-size:20px;
  background:linear-gradient(90deg,#7c5cbf,#e05c8a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{font-size:12px;color:var(--muted);}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;}
.card-title{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--text);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.icon-box{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ib-purple{background:rgba(124,92,191,0.25);}
.ib-teal{background:rgba(62,207,178,0.2);}
.ib-pink{background:rgba(224,92,138,0.2);}
.ib-amber{background:rgba(245,166,35,0.2);}

.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:3px;}
.stat-val{font-size:20px;font-family:'Black Han Sans',sans-serif;color:var(--text);}

.btn{padding:9px 16px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Gowun Dodum',sans-serif;font-size:13px;font-weight:bold;
  transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9c5ce0);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(124,92,191,0.45);}
.btn-primary:disabled{opacity:0.4;transform:none;box-shadow:none;cursor:not-allowed;}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);}
.btn-secondary:disabled{opacity:0.4;cursor:not-allowed;}
.btn-warn{background:linear-gradient(135deg,var(--accent4),#d4881a);color:#0f0e17;}
.btn-warn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(245,166,35,0.35);}

.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:bold;}
.tag-purple{background:rgba(124,92,191,0.2);color:#b99ef5;}
.tag-teal{background:rgba(62,207,178,0.2);color:#3ecfb2;}
.tag-pink{background:rgba(224,92,138,0.2);color:#e05c8a;}

.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.bar-label{font-size:12px;color:var(--muted);width:50px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:20px;background:var(--surface);border-radius:5px;overflow:hidden;position:relative;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:5px;transition:width 0.4s ease;}
.bar-pct{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:bold;}

.log-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 10px;max-height:100px;overflow-y:auto;
  font-size:11px;line-height:1.8;color:var(--muted);}
.log-good{color:#3ecfb2;}
.log-bad{color:#e05c8a;}
.log-info{color:#7c5cbf;}

.ep-badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:bold;
  background:rgba(124,92,191,0.2);color:#b99ef5;}
.explore-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:bold;}

/* 컨트롤 바 — 미로 카드 내부 하단 */
.ctrl-bar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:12px;padding-top:12px;
  border-top:1px solid var(--border);
}
input[type=range]{accent-color:var(--accent);}
</style>

<div style="background:var(--bg);min-height:100%;padding-bottom:2rem;">

<header>
  <div>
    <div class="logo">강화학습 AI 실습 🤖</div>
    <div class="subtitle">에이전트가 스스로 경험하며 최적 경로를 학습합니다</div>
  </div>
  <span class="ep-badge" id="ep-chip" style="margin-left:auto;">에피소드 0</span>
</header>

<div style="max-width:900px;margin:0 auto;padding:20px 16px 40px;">

  <div style="display:grid;grid-template-columns:1.15fr 1fr;gap:14px;margin-bottom:14px;">

    <!-- 왼쪽: 미로 + 컨트롤 -->
    <div class="card">
      <div class="card-title">
        <div class="icon-box ib-purple">🗺️</div>
        게임 화면
        <span class="explore-badge" id="explore-badge" style="background:rgba(245,166,35,0.15);color:#f5a623;margin-left:2px;">탐험 중</span>
      </div>

      <div style="display:flex;justify-content:center;">
        <canvas id="maze" width="300" height="300" style="border-radius:10px;border:1px solid var(--border);display:block;"></canvas>
      </div>

      <div style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:10px;">
        <span class="tag tag-teal">🍎 보상 +10</span>
        <span class="tag tag-pink">🔥 벌칙 −8</span>
        <span class="tag tag-purple">🚪 골인 +30</span>
      </div>

      <!-- 컨트롤 버튼 미로 바로 아래 -->
      <div class="ctrl-bar">
        <button class="btn btn-primary" id="btn-start" onclick="startSim()">▶ 시작</button>
        <button class="btn btn-secondary" id="btn-pause" onclick="pauseSim()" disabled>⏸ 정지</button>
        <button class="btn btn-warn" onclick="resetSim()">↺ 초기화</button>
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
          <span style="font-size:12px;color:var(--muted);">속도</span>
          <input type="range" min="1" max="5" value="1" id="speed-slider" step="1" style="width:72px;" oninput="updateSpeed(this.value)">
          <span id="speed-label" style="font-size:12px;color:var(--muted);min-width:22px;">x1</span>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 스탯 + Q값 + 로그 -->
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <div class="stat-card"><div class="stat-label">에피소드</div><div class="stat-val" id="stat-ep">0</div></div>
        <div class="stat-card"><div class="stat-label">누적 보상</div><div class="stat-val" id="stat-reward">0</div></div>
        <div class="stat-card"><div class="stat-label">성공 횟수</div><div class="stat-val" id="stat-win">0</div></div>
      </div>

      <div class="card" style="flex:1;">
        <div class="card-title" style="margin-bottom:6px;">
          <div class="icon-box ib-teal">📊</div>행동 선호도 (Q값)
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:9px;">경험이 쌓일수록 좋은 방향의 Q값이 높아집니다</div>
        <div id="action-bars"></div>
        <div style="font-size:11px;color:var(--muted);margin-top:7px;display:flex;gap:10px;flex-wrap:wrap;">
          <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#7c5cbf;vertical-align:middle;margin-right:3px;"></span>선호</span>
          <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#35335a;vertical-align:middle;margin-right:3px;"></span>보통</span>
          <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#e05c8a;vertical-align:middle;margin-right:3px;"></span>위험</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:6px;font-size:14px;">
          <div class="icon-box ib-amber">📋</div>학습 로그
        </div>
        <div class="log-box" id="log-box"></div>
      </div>
    </div>
  </div>

  <!-- 보상 그래프 -->
  <div class="card">
    <div class="card-title">
      <div class="icon-box ib-teal">📈</div>
      에피소드별 획득 보상 — 학습될수록 높아집니다
    </div>
    <canvas id="reward-chart" height="70" style="width:100%;"></canvas>
  </div>

  <div style="margin-top:10px;text-align:right;">
    <button class="btn btn-secondary" onclick="sendPrompt('Q-러닝이 정확히 어떤 원리로 작동하는지 쉽게 설명해줘 ↗')">Q-러닝 원리 ↗</button>
  </div>

</div>
</div>

<script>
const COLS=6,ROWS=6;
const WALLS=[[2,0],[2,1],[4,1],[4,2],[1,3],[1,4],[3,4],[3,5]];
const REWARDS=[[3,0],[5,2],[2,4]];
const PENALTIES=[[4,3],[0,4],[2,3]];
const GOAL=[5,5],START=[0,0];
const ACTIONS=['⬆ 위','⬇ 아래','⬅ 왼','➡ 오른'];
const DIRS=[[0,-1],[0,1],[-1,0],[1,0]];
const LR=0.5,GAMMA=0.9;
let epsilon=1.0;
const EPS_DECAY=0.94,EPS_MIN=0.04;

let Q={};
function getQ(x,y){const k=`${x},${y}`;if(!Q[k])Q[k]=[0,0,0,0];return Q[k];}
let pos=[...START],episode=0,totalReward=0,wins=0;
let running=false,paused=false,stepInterval=null;
let speed=1,epReward=0,stepsThisEp=0,rewardHistory=[],lastColor=null;
const MAX_STEPS=60;

const mc=document.getElementById('maze'),ctx=mc.getContext('2d');
const rc=document.getElementById('reward-chart'),rctx=rc.getContext('2d');
const CS=50; // 300/6

function isWall(x,y){return x<0||y<0||x>=COLS||y>=ROWS||WALLS.some(([a,b])=>a===x&&b===y);}
function isReward(x,y){return REWARDS.some(([a,b])=>a===x&&b===y);}
function isPenalty(x,y){return PENALTIES.some(([a,b])=>a===x&&b===y);}
function isGoal(x,y){return x===GOAL[0]&&y===GOAL[1];}

function drawMaze(){
  ctx.clearRect(0,0,mc.width,mc.height);
  for(let x=0;x<COLS;x++){
    for(let y=0;y<ROWS;y++){
      if(WALLS.some(([a,b])=>a===x&&b===y)){
        // 다크 벽
        ctx.fillStyle='#2d1f4e';ctx.fillRect(x*CS,y*CS,CS,CS);
        ctx.fillStyle='#35335a';ctx.fillRect(x*CS+1,y*CS+1,CS-2,3);
      } else {
        // 흰색 빈 칸
        const qs=getQ(x,y),maxQ=Math.max(...qs);
        ctx.fillStyle='#FAFAF8';ctx.fillRect(x*CS,y*CS,CS,CS);
        // Q값 높은 칸에 연보라 오버레이
        if(maxQ>1){
          ctx.fillStyle=`rgba(124,92,191,${Math.min(0.22,maxQ/55).toFixed(2)})`;
          ctx.fillRect(x*CS,y*CS,CS,CS);
        }
      }
    }
  }
  // 격자선
  ctx.strokeStyle='rgba(200,198,210,0.5)';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CS,0);ctx.lineTo(x*CS,ROWS*CS);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CS);ctx.lineTo(COLS*CS,y*CS);ctx.stroke();}

  const fs=Math.floor(CS*0.48);
  function cell(emoji,x,y,bg){
    if(bg){ctx.fillStyle=bg;ctx.fillRect(x*CS+1,y*CS+1,CS-2,CS-2);}
    ctx.font=`${fs}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,x*CS+CS/2,y*CS+CS/2);
  }
  REWARDS.forEach(([x,y])=>cell('🍎',x,y,'rgba(62,207,178,0.15)'));
  PENALTIES.forEach(([x,y])=>cell('🔥',x,y,'rgba(224,92,138,0.12)'));
  cell('🚪',GOAL[0],GOAL[1],'rgba(124,92,191,0.15)');

  // START 텍스트
  ctx.font=`bold ${Math.floor(CS*0.22)}px 'Gowun Dodum',sans-serif`;
  ctx.fillStyle='#9896b0';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('START',CS/2,CS/2+14);

  if(lastColor){ctx.fillStyle=lastColor;ctx.fillRect(pos[0]*CS+3,pos[1]*CS+3,CS-6,CS-6);}
  ctx.font=`${fs}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🤖',pos[0]*CS+CS/2,pos[1]*CS+CS/2);
}

function chooseAction(x,y){
  if(Math.random()<epsilon){
    const v=DIRS.map((d,i)=>isWall(x+d[0],y+d[1])?-1:i).filter(i=>i>=0);
    return v.length?v[Math.floor(Math.random()*v.length)]:0;
  }
  const qs=getQ(x,y);return qs.indexOf(Math.max(...qs));
}
function smProbs(qs){
  const mn=Math.min(...qs),sh=qs.map(q=>q-mn+0.5),mx=Math.max(...sh);
  const ex=sh.map(q=>Math.exp((q-mx)*0.6)),s=ex.reduce((a,b)=>a+b,0);
  return ex.map(e=>e/s);
}
function updateBars(){
  const qs=getQ(pos[0],pos[1]),probs=smProbs(qs);
  const mn=Math.min(...qs),mx=Math.max(...qs),rng=mx-mn||1;
  const c=document.getElementById('action-bars');c.innerHTML='';
  ACTIONS.forEach((a,i)=>{
    const pct=Math.round(probs[i]*100);
    const norm=(qs[i]-mn)/rng;
    const color=norm>0.65?'#7c5cbf':norm<0.25?'#e05c8a':'#35335a';
    const r=document.createElement('div');r.className='bar-row';
    r.innerHTML=`<span class="bar-label">${a}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,pct)}%;background:${color};"></div>
      <span class="bar-pct" style="color:${color}">${pct}%</span></div>
      <span style="font-size:10px;color:var(--muted);min-width:40px;text-align:right;">Q=${qs[i].toFixed(1)}</span>`;
    c.appendChild(r);
  });
  const b=document.getElementById('explore-badge');
  if(epsilon>0.5){b.textContent='탐험 중 (무작위)';b.style.background='rgba(245,166,35,0.15)';b.style.color='#f5a623';}
  else if(epsilon>0.15){b.textContent='학습 중';b.style.background='rgba(124,92,191,0.2)';b.style.color='#b99ef5';}
  else{b.textContent='활용 중 ✓';b.style.background='rgba(62,207,178,0.15)';b.style.color='#3ecfb2';}
}
function addLog(msg,cls=''){
  const box=document.getElementById('log-box');
  const el=document.createElement('div');el.style.cssText='padding:1px 0;';
  el.className=cls;el.textContent=msg;
  box.appendChild(el);
  while(box.children.length>40)box.removeChild(box.firstChild);
  box.scrollTop=box.scrollHeight;
}
function updateStats(){
  document.getElementById('stat-ep').textContent=episode;
  document.getElementById('stat-reward').textContent=totalReward;
  document.getElementById('stat-win').textContent=wins;
  document.getElementById('ep-chip').textContent=`에피소드 ${episode}`;
}
function drawRewardChart(){
  const W=rc.offsetWidth||500;rc.width=W;
  rctx.clearRect(0,0,W,rc.height);
  if(rewardHistory.length<2)return;
  const H=rc.height,pad={l:36,r:12,t:10,b:20};
  const mn=Math.min(...rewardHistory),mx=Math.max(...rewardHistory,1),rng=mx-mn||1;
  rctx.strokeStyle='rgba(53,51,90,0.6)';rctx.lineWidth=0.5;
  [0,0.5,1].forEach(f=>{
    const y=pad.t+(1-f)*(H-pad.t-pad.b);
    rctx.beginPath();rctx.moveTo(pad.l,y);rctx.lineTo(W-pad.r,y);rctx.stroke();
    rctx.fillStyle='#9896b0';rctx.font='10px sans-serif';rctx.textAlign='right';
    rctx.fillText(Math.round(mn+f*rng),pad.l-4,y+3);
  });
  const pts=rewardHistory.map((v,i)=>[
    pad.l+i/(rewardHistory.length-1)*(W-pad.l-pad.r),
    pad.t+(1-(v-mn)/rng)*(H-pad.t-pad.b)
  ]);
  const grad=rctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(124,92,191,0.3)');grad.addColorStop(1,'rgba(124,92,191,0)');
  rctx.beginPath();pts.forEach(([x,y],i)=>i===0?rctx.moveTo(x,y):rctx.lineTo(x,y));
  rctx.strokeStyle='#7c5cbf';rctx.lineWidth=2;rctx.lineJoin='round';rctx.stroke();
  rctx.lineTo(pts[pts.length-1][0],H-pad.b);rctx.lineTo(pts[0][0],H-pad.b);rctx.closePath();
  rctx.fillStyle=grad;rctx.fill();
  if(pts.length){const[lx,ly]=pts[pts.length-1];rctx.beginPath();rctx.arc(lx,ly,4,0,Math.PI*2);rctx.fillStyle='#7c5cbf';rctx.fill();}
  rctx.fillStyle='#9896b0';rctx.font='10px sans-serif';rctx.textAlign='center';
  rctx.fillText('에피소드 →',pad.l+(W-pad.l-pad.r)/2,H-2);
}

const SPEEDS=[700,350,150,60,15];

function doStep(){
  if(!running||paused)return;
  const[cx,cy]=pos,action=chooseAction(cx,cy);
  const[dx,dy]=DIRS[action],[nx,ny]=[cx+dx,cy+dy];
  let reward=0,msg='',logCls='';lastColor=null;
  if(isWall(nx,ny)){
    reward=-2;
    const qs=getQ(cx,cy);qs[action]=qs[action]+LR*(reward+GAMMA*Math.max(...qs)-qs[action]);
    msg=`[ep.${episode}] ${ACTIONS[action]} → 벽! Q값 하락`;logCls='log-bad';
  } else {
    const pQ=getQ(cx,cy)[action];pos=[nx,ny];
    if(isGoal(nx,ny)){
      reward=30;wins++;getQ(cx,cy)[action]=pQ+LR*(reward-pQ);
      lastColor='rgba(124,92,191,0.25)';
      msg=`[ep.${episode}] 🎉 골 도착! 보상 +30`;logCls='log-good';
    } else if(isReward(nx,ny)){
      reward=10;const nQ=Math.max(...getQ(nx,ny));getQ(cx,cy)[action]=pQ+LR*(reward+GAMMA*nQ-pQ);
      lastColor='rgba(62,207,178,0.2)';
      msg=`[ep.${episode}] ${ACTIONS[action]} → 🍎 보상 +10!`;logCls='log-good';
    } else if(isPenalty(nx,ny)){
      reward=-8;const nQ=Math.max(...getQ(nx,ny));getQ(cx,cy)[action]=pQ+LR*(reward+GAMMA*nQ-pQ);
      lastColor='rgba(224,92,138,0.2)';
      msg=`[ep.${episode}] ${ACTIONS[action]} → 🔥 벌칙 −8`;logCls='log-bad';
    } else {
      reward=-0.3;const nQ=Math.max(...getQ(nx,ny));getQ(cx,cy)[action]=pQ+LR*(reward+GAMMA*nQ-pQ);
    }
  }
  epReward+=reward;totalReward=Math.round(totalReward+reward);stepsThisEp++;
  if(msg)addLog(msg,logCls);
  drawMaze();updateBars();updateStats();
  if(isGoal(pos[0],pos[1])||stepsThisEp>=MAX_STEPS){
    rewardHistory.push(Math.round(epReward));
    if(rewardHistory.length>80)rewardHistory.shift();
    drawRewardChart();
    epsilon=Math.max(EPS_MIN,epsilon*EPS_DECAY);
    episode++;epReward=0;stepsThisEp=0;pos=[...START];lastColor=null;
  }
}
function startSim(){
  if(running&&!paused)return;
  running=true;paused=false;
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-pause').disabled=false;
  if(stepInterval)clearInterval(stepInterval);
  stepInterval=setInterval(doStep,SPEEDS[speed-1]);
  addLog('학습 시작! 처음에는 무작위로 행동합니다...','log-info');
}
function pauseSim(){
  if(!running)return;
  paused=true;clearInterval(stepInterval);
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-pause').disabled=true;
  addLog('⏸ 일시정지','log-info');
}
function resetSim(){
  running=false;paused=false;clearInterval(stepInterval);
  Q={};epsilon=1.0;pos=[...START];
  episode=0;totalReward=0;wins=0;epReward=0;stepsThisEp=0;
  rewardHistory=[];lastColor=null;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-pause').disabled=true;
  document.getElementById('log-box').innerHTML='';
  updateStats();drawMaze();updateBars();drawRewardChart();
  addLog('초기화 완료. 모든 학습 기록이 리셋됩니다.','log-info');
}
function updateSpeed(v){
  speed=parseInt(v);
