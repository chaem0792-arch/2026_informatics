<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Means 군집화 학습 — 영화 추천</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f0883e;
    --accent4: #bc8cff;
    --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .logo { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:600; color:var(--accent); }
  .subtitle { font-size:12px; color:var(--text-muted); border-left:1px solid var(--border); padding-left:14px; margin-left:4px; }

  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 28px;
    gap: 0;
    flex-shrink: 0;
  }
  .tab-btn {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn .tab-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 1px 6px;
    color: var(--text-muted);
  }
  .tab-btn.active .tab-num { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }

  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* 탭 1 */
  .explore-layout {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
    padding: 20px 28px;
    gap: 16px;
  }
  .dataset-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    flex-shrink: 0;
  }
  .dataset-intro strong { color: var(--accent); }

  .table-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .table-title { font-size: 14px; font-weight: 700; }
  .table-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .user-count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--accent);
  }

  .table-wrap {
    flex: 1;
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid rgba(48,54,61,0.5); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 9px 14px; vertical-align: middle; }
  .td-name { font-weight: 600; color: var(--text); }
  .td-age { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .td-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); }
  .mini-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .mini-bar-bg {
    width: 60px; height: 5px; background: var(--border);
    border-radius: 3px; overflow: hidden;
  }
  .mini-bar-fill { height: 100%; border-radius: 3px; }
  .td-cluster-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 탭 2 */
  .kmeans-layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 280px; min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .panel { border-bottom: 1px solid var(--border); padding: 18px; }
  .panel-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .step-badge {
    background: var(--accent); color: #000; border-radius: 50%;
    width: 18px; height: 18px; display: inline-flex; align-items: center;
    justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .k-control { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .k-display { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:600; color:var(--accent); width:44px; text-align:center; }
  .k-slider {
    flex: 1; -webkit-appearance: none; height: 4px;
    border-radius: 2px; background: var(--border); outline: none;
  }
  .k-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  .k-hint { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .centroid-list { display: flex; flex-direction: column; gap: 6px; }
  .centroid-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: 6px; padding: 7px 10px;
    font-size: 12px; font-family:'JetBrains Mono',monospace;
    opacity: 0.4; transition: opacity 0.2s;
  }
  .centroid-item.set { opacity: 1; }
  .centroid-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .centroid-coords { color: var(--text-muted); font-size: 11px; }

  .btn {
    width: 100%; padding: 9px 14px; border-radius: 8px; border: none;
    cursor: pointer; font-family:'Noto Sans KR',sans-serif;
    font-size: 13px; font-weight: 500; transition: all 0.15s; margin-top: 7px;
  }
  .btn-success { background: var(--accent2); color: #000; }
  .btn-success:hover { background: #4fc462; }
  .btn-success:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
  .btn-pause { background: var(--accent3); color: #000; }
  .btn-pause:hover { background: #f8a050; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 4px; }
  .btn-danger:hover { background: rgba(248,81,73,0.1); }
  .speed-control { display: flex; gap: 6px; }
  .speed-btn {
    flex: 1; padding: 5px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-muted); cursor: pointer; font-size: 11px; text-align: center; transition: all 0.15s;
  }
  .speed-btn.active { background: rgba(88,166,255,0.12); border-color: var(--accent); color: var(--accent); }

  .canvas-area {
    flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 14px; overflow: hidden;
  }
  .canvas-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; font-size: 13px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
  .status-dot.active { background: var(--accent2); animation: pulse 1.2s infinite; }
  .status-dot.done { background: var(--accent2); }
  .status-dot.waiting { background: var(--accent3); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #statusText { color: var(--text-muted); font-size: 13px; }
  .iteration-badge {
    font-family:'JetBrains Mono',monospace; font-size:12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; color: var(--accent);
  }

  .canvas-wrapper {
    position: relative; flex: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden; min-height: 0;
  }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  .canvas-hint {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); text-align: center;
    pointer-events: none; transition: opacity 0.3s;
  }
  .canvas-hint .hint-icon { font-size: 40px; margin-bottom: 10px; }
  .canvas-hint p { color: var(--text-muted); font-size: 14px; }

  .log-panel { max-height: 120px; overflow-y: auto; }
  .log-entry {
    font-family:'JetBrains Mono',monospace; font-size:11px;
    padding: 3px 0; border-bottom: 1px solid rgba(48,54,61,0.5
